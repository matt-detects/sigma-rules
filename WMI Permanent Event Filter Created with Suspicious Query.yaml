title: WMI Permanent Event Filter Created with Suspicious Query or Name
id: 9d2f4a17-5c8e-4b31-a7f0-2e6d8b3c5091
status: experimental
description: |
  NEW RULE — completes the WMI persistence triad (EID 19 + 20 + 21).
  Detects WMI event filter creation (Sysmon EID 19), the first stage of WMI persistence.
  Fires on suspicious trigger query patterns (timer, logon, process start) and on
  adversary naming conventions mirroring the EID 21 rule keyword list.
  Correlating all three EIDs on the same host within a short window is a
  near-zero false positive composite signal.
author: Matt S
date: 2026/03/03
references:
  - https://learn.microsoft.com/sysinternals/downloads/sysmon
  - https://attack.mitre.org/techniques/T1546/003/
  - https://www.ired.team/offensive-security/persistence/t1084-using-wmi-for-persistence
related:
  - id: a1c4e2f8-3d7b-4f90-b6e1-8c5d2a9f1e04
    type: related
  - id: 7f3a2c91-e84d-4b6f-a310-dc5f9e1a043b
    type: related
  - id: 3b8e1f72-cd04-4a9e-b507-f92d3a5e8061
    type: related
tags:
  - attack.persistence
  - attack.t1546.003
logsource:
  product: windows
  category: wmi_event
detection:
  selection_base:
    EventID: 19

  selection_suspicious_queries:
    Query|contains:
      - 'SELECT * FROM __InstanceModificationEvent'
      - 'Win32_LocalTime'
      - 'TargetInstance.Day'
      - '__InstanceCreationEvent'
      - 'Win32_ProcessStartTrace'
      - 'LogonSession'
      - '__TimerEvent'

  selection_suspicious_names:
    # Mirrors EID 21 keyword list for consistent chain coverage
    Name|contains:
      - 'Update'
      - 'Security'
      - 'Defender'
      - 'Telemetry'
      - 'Adobe'
      - 'Chrome'
      - 'OneDrive'
      - 'Svchost'
      - 'System'
      - 'Windows'
      - 'Check'

  filter_main_known_good:
    Name|contains:
      - 'Lenovo'
      - 'Dell'
      - 'Intel'
      - 'HP'

  condition: >
    selection_base
    and (selection_suspicious_queries or selection_suspicious_names)
    and not filter_main_known_good

falsepositives:
  - OEM management tools registering WMI filters. Tune filter_main_known_good from baseline.
  - Enterprise monitoring solutions using WMI event subscriptions.
  - Security products subscribing to WMI events for detection.
level: high
fields:
  - UtcTime
  - User
  - Name
  - EventNamespace
  - Query
  - CreatorProcessName
  - CreatorProcessId
