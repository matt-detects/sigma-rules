title: Suspicious PowerShell Execution with Encoded Command Argument
id: a1c4e2f8-3d7b-4f90-b6e1-8c5d2a9f1e04
status: experimental
description: |
  Detects PowerShell (powershell.exe or pwsh.exe) executed with an encoded command
  argument (-EncodedCommand / -enc / -en variants). Also detects renamed PowerShell
  binaries via OriginalFileName and IEX/WebClient download cradles in unencoded form.
  Evasion flag combination (-NoP, -W Hidden, -Enc) confirmed in observed WMI payloads.
  No user-based suppression — admin/service accounts are high-value targets.
  Forms part of WMI persistence detection chain with EID 19, 20, 21 rules.
author: Matt S
date: 2026/02/12
modified: 2026/03/03
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/
  - https://www.sans.org/blog/understanding-powershell-obfuscation/
  - https://lolbas-project.github.io/lolbas/Binaries/Powershell/
related:
  - id: 7f3a2c91-e84d-4b6f-a310-dc5f9e1a043b
    type: related
  - id: 3b8e1f72-cd04-4a9e-b507-f92d3a5e8061
    type: related
  - id: 9d2f4a17-5c8e-4b31-a7f0-2e6d8b3c5091
    type: related
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'

  selection_originalfilename:
    OriginalFileName:
      - 'PowerShell.EXE'
      - 'pwsh.dll'

  selection_encoded_flags:
    CommandLine|contains:
      - ' -EncodedCommand '
      - ' -encodedcommand '
      - ' -enc '
      - ' -en '

  selection_evasion_flags:
    # Confirmed observed combination: -NoP -W Hidden -Enc
    CommandLine|contains:
      - '-NoP'
      - '-NoPr'
      - '-NonI'
      - '-NonInteractive'
      - '-W Hi'
      - '-W hidden'
      - '-WindowStyle Hi'
      - '-WindowStyle hidden'

  selection_download_cradle:
    # Confirmed decoded payload: IEX(New-Object Net.WebClient).DownloadString('http://...')
    CommandLine|contains|all:
      - 'Net.WebClient'
      - 'DownloadString'

  selection_iex_cradle:
    CommandLine|contains|all:
      - 'IEX'
      - 'http'

  filter_main_known_good:
    # Path-based suppression only — username suppression intentionally omitted
    CommandLine|contains:
      - 'C:\Program Files\Microsoft Monitoring Agent\'
      - 'C:\Program Files\Azure\SCOM\'
      - 'C:\Windows\CCM\'

  condition: >
    (selection_image or selection_originalfilename)
    and (
      (selection_encoded_flags and selection_evasion_flags)
      or selection_download_cradle
      or selection_iex_cradle
    )
    and not filter_main_known_good

falsepositives:
  - SCCM/ConfigMgr client operations (tune filter with CCM paths)
  - Azure Monitor / SCOM agents
  - CI/CD pipeline agents (Azure DevOps, Jenkins, GitHub Actions runner)
  - EDR/security tooling using encoded commands for scanning
level: high
fields:
  - Image
  - OriginalFileName
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - ComputerName
  - ProcessId
  - ParentProcessId
